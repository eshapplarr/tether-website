<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ===== SETUP ZONE: invisible stuff ===== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- The text that shows in the browser tab -->
  <title>Tether — coming soon</title>

  <!-- What Google and link previews show as the description -->
  <meta name="description" content="Tether — a foster-first platform connecting dogs with homes that fit them. Launching in Houston.">

  <!-- Loading the Fraunces font from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">

  <!-- ===== STYLE ZONE: all the visual rules ===== -->
  <style>
    /* Reset: clears browser default spacing so we start clean */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* The whole page: cream background, centers everything */
    body {
      background: #faf8f2;
      color: #2a2e2a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* The content block in the middle */
    .card {
      max-width: 560px;
      text-align: center;
    }

    /* The small green pill above the wordmark */
    .pill {
      display: inline-block;
      background: #c2edca;
      color: #1f3a25;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 999px;
      margin-bottom: 28px;
    }

    /* The big "Tether" wordmark — uses Fraunces */
    h1 {
      font-family: "Fraunces", serif;
      font-weight: 700;
      font-size: 64px;
      letter-spacing: -1px;
      margin-bottom: 16px;
    }

    /* The mission statement line — also Fraunces */
    .mission {
      font-family: "Fraunces", serif;
      font-weight: 600;
      font-size: 24px;
      line-height: 1.35;
      margin-bottom: 20px;
    }

    /* The smaller paragraph under the mission */
    .sub {
      font-size: 16px;
      line-height: 1.6;
      color: #4a504a;
      margin-bottom: 32px;
    }

    /* The email contact link styled as a button */
    .contact {
      display: inline-block;
      background: #c2edca;
      color: #1f3a25;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 999px;
    }

    /* Button hover effect: darkens slightly when mouse is over it */
    .contact:hover {
      background: #aedcb8;
    }

    /* The tiny footer line at the bottom */
    .footer {
      margin-top: 48px;
      font-size: 13px;
      color: #8a908a;
    }

    /* On small screens (phones), shrink the big text */
    @media (max-width: 480px) {
      h1 { font-size: 48px; }
      .mission { font-size: 20px; }
    }
  </style>
</head>

<body>
  <!-- ===== VISIBLE ZONE: everything on the page ===== -->
  <div class="card">

    <div class="pill">Launching in Houston</div>

    <h1>Tether</h1>

    <p class="mission">A foster-first platform connecting dogs with homes that fit them.</p>

    <p class="sub">We're building a smarter way to match shelter dogs with the fosters who fit them — so fewer dogs run out of time waiting for the right home.</p>

    <a class="contact" href="mailto:hello@tether.dog">Follow along → hello@tether.dog</a>

    <p class="footer">Tether · Houston, TX · 2026</p>

  </div>
</body>
</html>
